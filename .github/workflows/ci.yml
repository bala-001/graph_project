name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Test suite (must pass)
        run: pytest tests/ -o addopts="" -q
      - name: Coverage gate (>=90% on src)
        run: |
          pytest tests/ -o addopts="" -q --cov=src --cov-report=term-missing --cov-fail-under=90

  eval-smoke:
    # Runs the eval runners on the SYNTHETIC sample. Regression must pass (D is
    # iso-precise vs baseline). Edge-precision + judge are report-only here: the
    # 85% / 95% gates can only be certified on production-scale labels, which
    # live in the access-controlled store, never in CI.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Regression gate on sample (must pass)
        run: python eval/runners/regression.py --eval-set eval/labels/sample
      - name: Edge precision report (non-gating on sample)
        run: python eval/runners/edge_precision.py --eval-set eval/labels/sample --output edge.json || true
      - name: Judge pass-rate report (non-gating on sample)
        run: python eval/runners/judge_pass_rate.py --eval-set eval/labels/sample --output judge.json || true
      - name: Validate reports are well-formed
        run: |
          python -c "import json; r=json.load(open('edge.json')); assert r['aggregate']['precision']==1.0, r"
          python -c "import json; r=json.load(open('judge.json')); assert r['judge_pass_rate']==1.0, r"

  # NOTE (eval-trigger merge gate, per CLAUDE.md): PRs touching
  # src/d_extraction/prompts.py, src/d_extraction/schema.py,
  # src/guardrails/detector.py, or src/cascade_integration/recal.py must run the
  # FULL eval suite against production labels before merge to a protected branch.
  # That job is intentionally not defined here because it requires the
  # access-controlled F6 label store; wire it as a required check in the
  # protected-branch ruleset when those labels exist.
